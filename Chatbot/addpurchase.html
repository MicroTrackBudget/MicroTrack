<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBud - Add Purchase</title>
    <link rel="stylesheet" href="appstyles.css">
    <script type="text/javascript">
window.addEventListener('load',function(){function loadHeyy(){window.heyySettings={widgetId:"pllhkLtTB3weRcr2",baseUrl:"https://live-chat.heyy.io"};var s=document.createElement('script');s.type='text/javascript';s.async=true;s.src='https://assets.heyy.io/live-chat/live-chat.js';document.head.appendChild(s);}if('requestIdleCallback'in window){requestIdleCallback(loadHeyy);}else{setTimeout(loadHeyy,3000);}});
</script>
</head>
<body>
    <div class="container">
        <div class="phone-frame">
            <div class="screen">
                <div class="status-bar">
                    <span id="currentTime"></span>
                    <div class="menu-wrapper">
    <span class="menu-dots" onclick="toggleMenu()">●●●</span>
    <div class="menu-dropdown" id="menuDropdown">
        <div onclick="logout()">Logout</div>
        </div>
        </div>
                </div>
                <div class="header">Add Purchase</div>
                
                <div class="content">
                    <form id="purchaseForm">
                        <div class="form-group">
                            <label class="form-label">Item Name</label>
                            <input type="text" class="form-input" id="itemName" placeholder="Enter item name" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select class="form-select" id="category" required>
                                <option value="">Select category</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Store / Retailer</label>
                            <input type="text" class="form-input" id="store" placeholder="Enter store name" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Price</label>
                            <input type="number" class="form-input" id="price" placeholder="0.00" step="0.01" min="0" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Quantity</label>
                            <input type="number" class="form-input" id="quantity" placeholder="1" value="1" min="1" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Tax Rate (%)</label>
                            <input type="number" class="form-input" id="taxRate" placeholder="8" value="8" step="0.01" min="0" max="100">
                        </div>
                        
                        <div class="calculated-box">
                            <div class="calc-row">
                                <span>Subtotal:</span>
                                <span id="subtotal">$0.00</span>
                            </div>
                            <div class="calc-row">
                                <span>Tax (<span id="taxPercent">8</span>%):</span>
                                <span id="tax">$0.00</span>
                            </div>
                            <div class="calc-row total">
                                <span>Total:</span>
                                <span id="total">$0.00</span>
                            </div>
                            <div class="calc-row" style="margin-top: 12px; color: #4CAF50;">
                                <span>Budget After Purchase:</span>
                                <span id="budgetAfter">$0.00</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Upload Receipt</label>
                            <input type="file" id="receiptInput" accept="image/*" capture="environment">
                            <small style="font-size:11px;color:#999;">
                                 Upload a receipt to auto-fill
                            </small>
                        </div>       
                        
                        <button type="submit" class="btn-primary">Save Purchase</button>
                        <button type="button" class="btn-secondary" onclick="document.getElementById('purchaseForm').reset(); calculateTotal();">Clear Form</button>
                    </form>
                </div>
                
                <div class="nav-bar">
                    <div class="nav-item">
                        <a href="home.html" class="nav-icon">Home</a>
                    </div>
                    <div class="nav-item active">
                        <a href="addpurchase.html" class="nav-icon">Add</a>
                    </div>
                    <div class="nav-item">
                        <a href="budget.html" class="nav-icon">Budgets</a>
                    </div>
                    <div class="nav-item">
                        <a href="pricetracker.html" class="nav-icon">Prices</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        //Update time
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = `${hours}:${minutes}`;
        }
        updateTime();
        setInterval(updateTime, 60000);
        
    function toggleMenu() {
    const menu = document.getElementById('menuDropdown');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

function logout() {
    localStorage.removeItem('isLoggedIn');
    window.location.href = 'index.html';
}

//Close when clicking outside
document.addEventListener('click', function(e) {
    const menu = document.getElementById('menuDropdown');
    if (!e.target.closest('.menu-wrapper') && menu) {
        menu.style.display = 'none';
    }
}); 

    //Check if user is logged in
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'index.html';
        }
        
    //Load categories from budgets
        function loadCategories() {
            const budgets = JSON.parse(localStorage.getItem('budgets') || '[]');
            const categorySelect = document.getElementById('category');
            
            if (budgets.length === 0) {
                categorySelect.innerHTML = '<option value="">No budgets created yet</option>';
                return;
            }
            
            categorySelect.innerHTML = '<option value="">Select category</option>';
            budgets.forEach(budget => {
                const option = document.createElement('option');
                option.value = budget.name;
                option.textContent = `${budget.emoji} ${budget.name}`;
                categorySelect.appendChild(option);
            });
        }
        
    //Calculate total in real-time
        function calculateTotal() {
            const price = parseFloat(document.getElementById('price').value) || 0;
            const quantity = parseInt(document.getElementById('quantity').value) || 1;
            const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
            const category = document.getElementById('category').value;
            
            const subtotal = price * quantity;
            const taxAmount = subtotal * (taxRate / 100);
            const total = subtotal + taxAmount;
            
            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').textContent = `$${taxAmount.toFixed(2)}`;
            document.getElementById('taxPercent').textContent = taxRate.toFixed(1);
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
            
        //Calculate budget after purchase
            if (category) {
                const budgets = JSON.parse(localStorage.getItem('budgets') || '[]');
                const purchases = JSON.parse(localStorage.getItem('purchases') || '[]');
                const budget = budgets.find(b => b.name === category);
                
                if (budget) {
                    const categoryPurchases = purchases.filter(p => p.category === category);
                    const currentSpent = categoryPurchases.reduce((sum, p) => sum + parseFloat(p.total), 0);
                    const afterPurchase = budget.limit - currentSpent - total;
                    document.getElementById('budgetAfter').textContent = `$${afterPurchase.toFixed(2)}`;
                    document.getElementById('budgetAfter').style.color = afterPurchase < 0 ? '#F44336' : '#4CAF50';
                }
            }
        }
        
    //Add event listeners for real-time calculation
        document.getElementById('price').addEventListener('input', calculateTotal);
        document.getElementById('quantity').addEventListener('input', calculateTotal);
        document.getElementById('taxRate').addEventListener('input', calculateTotal);
        document.getElementById('category').addEventListener('change', calculateTotal);
        
    //Handle form submission
        document.getElementById('purchaseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const purchase = {
                id: Date.now(),
                itemName: document.getElementById('itemName').value,
                category: document.getElementById('category').value,
                store: document.getElementById('store').value,
                price: parseFloat(document.getElementById('price').value),
                quantity: parseInt(document.getElementById('quantity').value),
                taxRate: parseFloat(document.getElementById('taxRate').value),
                subtotal: parseFloat(document.getElementById('subtotal').textContent.replace('$', '')),
                tax: parseFloat(document.getElementById('tax').textContent.replace('$', '')),
                total: parseFloat(document.getElementById('total').textContent.replace('$', '')),
                date: new Date().toISOString()
            };
            
        //Save to localStorage
            const purchases = JSON.parse(localStorage.getItem('purchases') || '[]');
            purchases.push(purchase);
            localStorage.setItem('purchases', JSON.stringify(purchases));
            
        //Success message
            alert('✅ Purchase saved successfully!');
            
        //Redirect to home
            window.location.href = 'home.html';
        });
        
    //Load categories on page load
        loadCategories();

       //Save purchase 
        document.getElementById('purchaseForm').addEventListener('submit', function(e) {
            e.preventDefault();

    const purchases = JSON.parse(localStorage.getItem('purchases') || '[]');

    purchases.push({
        name: document.getElementById('itemName').value,
        amount: parseFloat(document.getElementById('totalAmount').value),
        date: new Date().toISOString()
    });

    localStorage.setItem('purchases', JSON.stringify(purchases));

    alert('✅ Purchase saved!');
    this.reset();
        }); 

//Receipt scnanning function
document.getElementById('receiptInput').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    alert('📷 Scanning receipt');

    try {
        const result = await Tesseract.recognize(file, 'eng');
        const text = result.data.text;

        const matches = text.match(/\$?\s?(\d+\.\d{2})/g);
        if (matches && matches.length > 0) {
            const lastAmount = matches[matches.length - 1].replace('$','');
            document.getElementById('totalAmount').value = lastAmount;
        }

        alert('✅ Receipt scanned! Verify details.');
        } catch (err) {
        alert('❌ Could not read receipt clearly.');
        console.error(err);
    }
});
    </script>
</body>
</html>
