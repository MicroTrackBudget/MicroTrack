<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBud - Create Account</title>
    <link rel="stylesheet" href="appstyles.css">
    
</head>
<body>
    <div class="confetti" id="confetti"></div>
    
    <div class="login-container">
        <div class="phone-frame">
            <div class="screen">
                <span id="currentTime"></span>
                <div class="status-bar">
                </div>
                
                <div class="content" style="padding-top: 30px;">
                    <div class="logo-container">
                        <div class="logo">💰</div>
                        <div class="app-name">BudgetBud</div>
                        <div class="tagline">by MicroTrack</div>
                    </div>
                    
                    <div class="welcome-text">
                        <h2>Create Your Account</h2>
                        <p>Start tracking your spending today! 🎯</p>
                    </div>
                    
                    <form id="signupForm">
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-input" id="fullName" placeholder="John Doe" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-input" id="email" placeholder="your.email@example.com" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-input" id="password" placeholder="••••••••" required minlength="6">
                            <div class="password-strength">
                                <div class="password-strength-bar" id="strengthBar"></div>
                            </div>
                            <div class="password-hint" id="strengthText">Password must be at least 6 characters</div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" required>
                            <div class="password-hint" id="matchText"></div>
                        </div>
                        
                        <button type="submit" class="btn-primary" style="margin-top: 20px;">
                            Create Account 🚀
                        </button>
                        
                        <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">
                            Already Have an Account? Log In
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script>

        document.getElementById('signupForm').addEventListener('submit', async function(e){
        
            e.preventDefault();
        
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
        
            if(password !== confirmPassword){
                alert("❌ Passwords do not match");
                return;
            }
        
            if(password.length < 6){
                alert("❌ Password must be at least 6 characters");
                return;
            }
        
            const response = await fetch("/register",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    username: fullName,
                    email: email,
                    password: password
                })
            });
        
            const data = await response.json();
        
            if(response.ok){
        
                alert("✅ Account created successfully!");
        
                setTimeout(()=>{
                    window.location.href = "index.html";
                },1000);
        
            }else{
        
                alert(data.error);
        
            }
        
        });
        </script>
</body>
</html>
