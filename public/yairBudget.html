<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BudgetBud - Manage Budgets</title>
  <link rel="stylesheet" href="appstyles.css">
</head>
<body>
  <div class="container">
    <div class="phone-frame">
      <div class="screen">
        <!-- STATUS BAR -->
        <div class="status-bar">
          <span id="currentTime"></span>
          <div class="menu-wrapper">
            <span class="menu-dots" onclick="toggleMenu()">●●●</span>
            <div class="menu-dropdown" id="menuDropdown">
              <div onclick="logout()">Logout</div>
            </div>
          </div>
        </div>

        <!-- HEADER -->
        <div class="header">Manage Budgets</div>

        <!-- MAIN CONTENT -->
        <div class="content">
          <div class="summary-box" style="background:#E3F2FD;border:2px solid #2196F3;">
            <div class="summary-label">Total Monthly Budget</div>
            <div class="summary-value" style="color:#2196F3;" id="totalBudget">$0</div>
          </div>

          <div class="section-title">Your Budgets</div>
          <div id="budgetsList" style="min-height:150px; text-align:center; color:#999;">
            <p style="font-size:48px;margin-bottom:10px;">💸</p>
            <p>No budgets yet!</p>
            <p style="font-size:13px;margin-top:10px;">
              Click the + button below to create your first budget
            </p>
          </div>

          <div class="section-title" style="margin-top:30px;">Actions</div>
          <button class="btn-primary" style="margin-bottom:10px;" onclick="openModal()">Create New Budget</button>
          <button class="btn-secondary" onclick="viewReport()">View Spending Report</button>
        </div>

        <!-- ADD BUTTON -->
        <div class="add-button" onclick="openModal()">+</div>

        <!-- NAV BAR -->
        <div class="nav-bar">
          <div class="nav-item"><a href="home.html" class="nav-icon">Home</a></div>
          <div class="nav-item"><a href="addpurchase.html" class="nav-icon">Add</a></div>
          <div class="nav-item active"><a href="budget.html" class="nav-icon">Budgets</a></div>
          <div class="nav-item"><a href="pricetracker.html" class="nav-icon">Prices</a></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="budgetModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        Create New Budget
        <span class="close-modal" onclick="closeModal()">&times;</span>
      </div>
      <form id="budgetForm">
        <div class="form-group">
          <label class="form-label">Choose an Emoji</label>
          <div class="emoji-picker">
            <div class="emoji-option selected" onclick="selectEmoji('🛒', event)">🛒</div>
            <div class="emoji-option" onclick="selectEmoji('👕', event)">👕</div>
            <div class="emoji-option" onclick="selectEmoji('📱', event)">📱</div>
            <div class="emoji-option" onclick="selectEmoji('🎮', event)">🎮</div>
            <div class="emoji-option" onclick="selectEmoji('🍕', event)">🍕</div>
            <div class="emoji-option" onclick="selectEmoji('⛽', event)">⛽</div>
            <div class="emoji-option" onclick="selectEmoji('🏠', event)">🏠</div>
            <div class="emoji-option" onclick="selectEmoji('✈️', event)">✈️</div>
            <div class="emoji-option" onclick="selectEmoji('🏥', event)">🏥</div>
            <div class="emoji-option" onclick="selectEmoji('📚', event)">📚</div>
            <div class="emoji-option" onclick="selectEmoji('🎬', event)">🎬</div>
            <div class="emoji-option" onclick="selectEmoji('💄', event)">💄</div>
          </div>
          <input type="hidden" id="selectedEmoji" value="🛒">
        </div>

        <div class="form-group">
          <label class="form-label">Budget Name</label>
          <input type="text" class="form-input" id="budgetName" required>
        </div>

        <div class="form-group">
          <label class="form-label">Monthly Limit ($)</label>
          <input type="number" class="form-input" id="budgetLimit" step="0.01" min="0" required>
        </div>

        <button type="submit" class="btn-primary">Create Budget</button>
        <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
      </form>
    </div>
  </div>

  <script>
    const API = "http://localhost:3000";
    const userId = localStorage.getItem("userId");

    // TIME
    function updateTime() {
      const now = new Date();
      document.getElementById("currentTime").textContent =
        now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
    }
    updateTime();
    setInterval(updateTime, 60000);

    // AUTH CHECK
    if (!userId) { window.location.href = "yairBudget.html"; }

    // MENU
    function toggleMenu() {
      const menu = document.getElementById("menuDropdown");
      menu.style.display = menu.style.display === "block" ? "none" : "block";
    }
    function logout() {
      localStorage.removeItem("userId");
      window.location.href = "yairBudget.html";
    }
    document.addEventListener("click", function(e) {
      if (!e.target.closest(".menu-wrapper")) {
        document.getElementById("menuDropdown").style.display = "none";
      }
    });

    // EMOJI
    let selectedEmoji = "🛒";
    function selectEmoji(emoji, event) {
      selectedEmoji = emoji;
      document.querySelectorAll(".emoji-option").forEach(el => el.classList.remove("selected"));
      event.currentTarget.classList.add("selected");
      document.getElementById("selectedEmoji").value = emoji;
    }

    // MODAL
    function openModal() { document.getElementById("budgetModal").classList.add("active"); }
    function closeModal() {
      document.getElementById("budgetModal").classList.remove("active");
      document.getElementById("budgetForm").reset();
      document.querySelectorAll(".emoji-option").forEach(el => el.classList.remove("selected"));
      document.querySelector(".emoji-option").classList.add("selected");
      selectedEmoji = "🛒";
    }

    // LOAD BUDGETS
    async function loadBudgets() {
      const res = await fetch(`${API}/budgets/${userId}`);
      const budgets = await res.json();
      const list = document.getElementById("budgetsList");
      list.innerHTML = "";

      if (budgets.length === 0) {
        list.innerHTML = `<div style="text-align:center;padding:40px;color:#999;">
          <p style="font-size:48px;">💸</p><p>No budgets yet!</p></div>`;
        document.getElementById("totalBudget").textContent = "$0";
        return;
      }

      let total = 0;
      budgets.forEach(b => {
        total += parseFloat(b.monthly_limit);
        const percent = ((b.monthly_limit - b.remaining_amount) / b.monthly_limit * 100).toFixed(0);
        let color = "#4CAF50";
        if (percent >= 100) color = "#F44336";
        else if (percent >= 75) color = "#FF9800";

        const item = document.createElement('div');
        item.className = 'budget-list-item';
        item.innerHTML = `
          <div class="budget-list-info">
            <h3>${selectedEmoji} ${b.budget_name}</h3>
            <div class="budget-list-details">
              <div class="mini-icon" style="background:${color};"></div>
              ${percent}% used
            </div>
          </div>
          <div class="budget-list-amount">
            <div class="amount-spent">$${(b.monthly_limit - b.remaining_amount).toFixed(2)}</div>
            <div class="amount-limit">of $${b.monthly_limit}</div>
            <button type="button" class="delete-btn"
              style="margin-top:8px;padding:4px 12px;background:#F44336;color:white;border:none;border-radius:4px;font-size:11px;">
              Delete</button>
          </div>`;
        item.querySelector('.delete-btn').addEventListener('click', () => deleteBudget(b.budget_id));
        list.appendChild(item);
      });

      document.getElementById("totalBudget").textContent = `$${total.toFixed(2)}`;
    }

    // CREATE BUDGET
    document.getElementById("budgetForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const budgetName = document.getElementById("budgetName").value;
      const budgetLimit = parseFloat(document.getElementById("budgetLimit").value);

      await fetch(`${API}/createBudget`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          budget_name: budgetName,
          monthly_limit: budgetLimit,
          weekly_limit: 0,
          user_id: userId,
          category_id: 1,
          start_date: new Date(),
          end_date: new Date()
        })
      });

      closeModal();
      await loadBudgets();
      alert("Budget created successfully!");
    });

    // DELETE BUDGET
    async function deleteBudget(id) {
      if (!confirm("Delete this budget?")) return;
      await fetch(`${API}/budget/${id}`, { method: "DELETE" });
      loadBudgets();
    }

    // VIEW REPORT
    async function viewReport() {
      const res = await fetch(`${API}/transactions/${userId}`);
      const purchases = await res.json();
      if (purchases.length === 0) { alert("No purchases recorded yet!"); return; }

      let total = 0;
      purchases.forEach(p => total += parseFloat(p.transaction_amount));
      alert(`Spending Report:\n\nTotal Spent: $${total.toFixed(2)}\nTotal Purchases: ${purchases.length}`);
    }

    // INITIAL LOAD
    loadBudgets();
  </script>
</body>
</html>
