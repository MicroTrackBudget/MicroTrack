<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>BudgetBud - Manage Budgets</title>
   <link rel="stylesheet" href="appstyles.css">
      
</head>
<body>
   <div class="container">
       <div class="phone-frame">
           <div class="screen">
               <div class="status-bar">
                   <span id="currentTime"></span>
                   <div class="menu-wrapper">
   <span class="menu-dots" onclick="toggleMenu()">●●●</span>
   <div class="menu-dropdown" id="menuDropdown">
       <div onclick="logout()">Logout</div>
   </div>
</div>
               </div>
              
               <div class="header">Manage Budgets</div>
              
               <div class="content" style="padding-bottom: 80px;">
                   <div class="summary-box" style="background: #E3F2FD; border: 2px solid #2196F3;">
                       <div class="summary-label">Total Monthly Budget</div>
                       <div class="summary-value" style="color: #2196F3;" id="totalBudget">$0</div>
                   </div>
                  
                   <div class="section-title">Your Budgets</div>
                  
                   <div id="budgetsList">
                       <div style="text-align: center; padding: 40px 20px; color: #999;">
                           <p style="font-size: 48px; margin-bottom: 10px;">💸</p>
                           <p>No budgets yet!</p>
                           <p style="font-size: 13px; margin-top: 10px;">Click the + button below to create your first budget</p>
                       </div>
                   </div>
                  
                   <div class="section-title" style="margin-top: 30px;">Actions</div>
                  
                   <button class="btn-primary" style="margin-bottom: 10px;" onclick="openModal()">Create New Budget</button>
                   <button class="btn-secondary" onclick="viewReport()">View Spending Report</button>
               </div>
              
               <div class="add-button" onclick="openModal()">+</div>
              
               <div class="nav-bar">
                   <div class="nav-item">
                       <a href="home.html" class="nav-icon">Home</a>
                   </div>
                   <div class="nav-item">
                       <a href="addpurchase.html" class="nav-icon">Add</a>
                   </div>
                   <div class="nav-item active">
                       <a href="budget.html" class="nav-icon">Budgets</a>
                   </div>
                   <div class="nav-item">
                       <a href="pricetracker.html" class="nav-icon">Prices</a>
                   </div>
               </div>
           </div>
       </div>
   </div>
  
   <!--Budget Modal-->
   <div id="budgetModal" class="modal">
       <div class="modal-content">
           <div class="modal-header">
               Create New Budget
               <span class="close-modal" onclick="closeModal()">&times;</span>
           </div>
          
           <form id="budgetForm">
               <div class="form-group">
                   <label class="form-label">Choose an Emoji</label>
                   <div class="emoji-picker" id="emojiPicker">
                       <div class="emoji-option" onclick="selectEmoji('🛒')">🛒</div>
                       <div class="emoji-option" onclick="selectEmoji('👕')">👕</div>
                       <div class="emoji-option" onclick="selectEmoji('📱')">📱</div>
                       <div class="emoji-option" onclick="selectEmoji('🎮')">🎮</div>
                       <div class="emoji-option" onclick="selectEmoji('🍕')">🍕</div>
                       <div class="emoji-option" onclick="selectEmoji('⛽')">⛽</div>
                       <div class="emoji-option" onclick="selectEmoji('🏠')">🏠</div>
                       <div class="emoji-option" onclick="selectEmoji('✈️')">✈️</div>
                       <div class="emoji-option" onclick="selectEmoji('🏥')">🏥</div>
                       <div class="emoji-option" onclick="selectEmoji('📚')">📚</div>
                       <div class="emoji-option" onclick="selectEmoji('🎬')">🎬</div>
                       <div class="emoji-option" onclick="selectEmoji('💄')">💄</div>
                   </div>
                   <input type="hidden" id="selectedEmoji" value="🛒">
               </div>
              
               <div class="form-group">
                   <label class="form-label">Budget Name</label>
                   <input type="text" class="form-input" id="budgetName" placeholder="e.g., Groceries, Clothing" required>
               </div>
              
               <div class="form-group">
                   <label class="form-label">Monthly Limit ($)</label>
                   <input type="number" class="form-input" id="budgetLimit" placeholder="0.00" step="0.01" min="0" required>
               </div>
              
               <button type="submit" class="btn-primary">Create Budget</button>
               <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
           </form>
       </div>
       </div>
  
       <script>

        //Update time
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = `${hours}:${minutes}`;
        }
        updateTime();
        setInterval(updateTime, 60000);

        function toggleMenu() {
            const menu = document.getElementById('menuDropdown');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'index.html';
        }

        //Close when clicking outside
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('menuDropdown');
            if (!e.target.closest('.menu-wrapper') && menu) {
                menu.style.display = 'none';
            }
        });
    
        //Check if user is logged in
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'index.html';
        }

        let selectedEmojiValue = '🛒';
        
        const categoryNames = {
            "🛒": "Groceries",
            "👕": "Clothing",
            "📱": "Electronics",
            "🎮": "Gaming",
            "🍕": "Food",
            "⛽": "Gas",
            "🏠": "Housing",
            "✈️": "Travel",
            "🏥": "Healthcare",
            "📚": "Education",
            "🎬": "Entertainment",
            "💄": "Beauty"
        };
        
        function selectEmoji(emoji) {
            selectedEmojiValue = emoji;
        
            document.querySelectorAll('.emoji-option').forEach(el => {
                el.classList.remove('selected');
            });
        
            event.target.classList.add('selected');
        }
        
        function openModal(){
            document.getElementById('budgetModal').classList.add('active');
        }
        
        function closeModal(){
            document.getElementById('budgetModal').classList.remove('active');
        }
        
        
        async function loadBudgets(){
        
            const userId = parseInt(localStorage.getItem("userId")); // fixed variable name
            if (!userId) {
                alert("User not logged in");
                return;
            }
        
            const response = await fetch(`/budgets/${userId}`);
            const budgets = await response.json();
        
            const budgetsList = document.getElementById('budgetsList');
        
            if(budgets.length === 0){
                budgetsList.innerHTML = `<p style="text-align:center;">No budgets yet!</p>`;
                return;
            }
        
            budgetsList.innerHTML = "";
        
            let totalBudget = 0;
        
            budgets.forEach(budget => {
        
                totalBudget += parseFloat(budget.monthly_limit);
        
                const percent = (budget.spent / budget.monthly_limit) * 100;
        
                let color = "#4CAF50";
                if(percent >= 100) color="#F44336";
                else if(percent >= 75) color="#FF9800";
        
                const html = `
                <div class="budget-list-item">
        
                    <div class="budget-list-info">
                        <h3>${budget.category_name}</h3>
        
                        <div class="budget-list-details">
                            <div class="mini-icon" style="background:${color};"></div>
                            ${percent.toFixed(0)}% used
                        </div>
                    </div>
        
                    <div class="budget-list-amount">
        
                        <div class="amount-spent">$${budget.spent}</div>
                        <div class="amount-limit">of $${budget.monthly_limit}</div>
        
                        <button onclick="deleteBudget(${budget.budget_id})"
                        style="margin-top:8px;padding:4px 12px;background:#F44336;color:white;border:none;border-radius:4px;">
                        Delete
                        </button>
        
                    </div>
        
                </div>
                `;
        
                budgetsList.innerHTML += html;
        
            });
        
            document.getElementById("totalBudget").textContent = "$"+totalBudget.toFixed(2);
        }
        
        
        document.getElementById("budgetForm").addEventListener("submit", async function(e){
        
            e.preventDefault();
        
            const monthly_limit = parseFloat(document.getElementById("budgetLimit").value);
            const user_id = parseInt(localStorage.getItem("userId")); 
        
            const category_name = categoryNames[selectedEmojiValue];
        
            const catRes = await fetch("/getOrCreateCategory", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ category_name })
            });
        
            const catData = await catRes.json();
            const category_id = catData.category_id;
        
            const response = await fetch("/createBudget",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    monthly_limit,
                    weekly_limit:0,
                    user_id,
                    category_id
                })
            });
        
            const data = await response.json();
        
            if(response.ok){
                alert("Budget created!");
                closeModal();
                loadBudgets();
            }else{
                alert(data.error);
            }
        
        });
        
        
        async function deleteBudget(id){
        
            if(!confirm("Delete this budget?")) return;
        
            const response = await fetch(`/budget/${id}`,{
                method:"DELETE"
            });
        
            if(response.ok){
                loadBudgets();
            }else{
                alert("Delete failed");
            }
        
        }
        
        loadBudgets();
        
        </script>

</body>
</html>
