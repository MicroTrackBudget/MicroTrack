<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBud - Home</title>
    <link rel="stylesheet" href="appstyles.css">
    <script type="text/javascript">
        window.addEventListener('load',function(){function loadHeyy(){window.heyySettings={widgetId:"pllhkLtTB3weRcr2",baseUrl:"https://live-chat.heyy.io"};var s=document.createElement('script');s.type='text/javascript';s.async=true;s.src='https://assets.heyy.io/live-chat/live-chat.js';document.head.appendChild(s);}if('requestIdleCallback'in window){requestIdleCallback(loadHeyy);}else{setTimeout(loadHeyy,3000);}});
        </script>
</head>
<body>
    <div class="container">
        <div class="phone-frame">
            <div class="screen">
                <div class="status-bar">
                    <span id="currentTime"></span>
                <div class="menu-wrapper">
        <span class="menu-dots" onclick="toggleMenu()">●●●</span>
        <div class="menu-dropdown" id="menuDropdown">
            <div onclick="logout()">Logout</div>
        </div>
    </div>  
                </div>
                
                <div class="header">
                    BudgetBud
                </div>
              
                <div class="content" id="mainContent" style="visibility:hidden;">
                    <div class="summary-box">
                        <div class="summary-label">Monthly Budget Remaining</div>
                        <div class="summary-value" id="totalRemaining">$0.00</div>
                        <div class="summary-label" style="margin-top: 5px;">of <span id="totalBudget">$0.00</span></div>
                    </div>
                    
                    <div class="alert-box" id="alertBox" style="display: none;">
                        ⚠️ <span id="alertMessage"></span>
                    </div>
                    
                    <div class="section-title">Active Budgets</div>
                    
                    <div id="budgetList">
                        <div style="text-align: center; padding: 40px 20px; color: #999;">
                            <p style="font-size: 48px; margin-bottom: 10px;">📊</p>
                            <p>No budgets yet!</p>
                            <p style="font-size: 13px; margin-top: 10px;">Click on "Budgets" below to create your first budget</p>
                        </div>
                    </div>
                </div>
                
                <div class="nav-bar">
                    <div class="nav-item active">
                        <a href="home.html" class="nav-icon">Home</a>
                    </div>
                    <div class="nav-item">
                        <a href="addpurchase.html" class="nav-icon">Add</a>
                    </div>
                    <div class="nav-item">
                        <a href="budget.html" class="nav-icon">Budgets</a>
                    </div>
                    <div class="nav-item">
                        <a href="pricetracker.html" class="nav-icon">Prices</a>
                    </div>
                    <div class="nav-item">
                        <a href="calculator.html" class="nav-icon">Calculator</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = "https://microtrack-production.up.railway.app";

    //Update time
    function updateTime() {
        const now = new Date();
        const hours = now.getHours();
        const minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('currentTime').textContent = `${hours}:${minutes}`;
    }
    updateTime();
    setInterval(updateTime, 60000);
        
    function toggleMenu() {
    const menu = document.getElementById('menuDropdown');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }
    
    function logout() {
        localStorage.removeItem('isLoggedIn');
        window.location.href = 'index.html';
    }

    //Close when clicking outside
    document.addEventListener('click', function(e) {
        const menu = document.getElementById('menuDropdown');
        if (!e.target.closest('.menu-wrapper') && menu) {
            menu.style.display = 'none';
        }
    });
    
    //Check if user is logged in
    if (!localStorage.getItem('isLoggedIn')) {
        window.location.href = 'index.html';
    }

    const categoryNames = {
        "🛒": "Groceries",
        "👕": "Clothing",
        "📱": "Electronics",
        "🎮": "Gaming",
        "🍕": "Food",
        "⛽": "Gas",
        "🏠": "Housing",
        "✈️": "Travel",
        "🏥": "Healthcare",
        "📚": "Education",
        "🎬": "Entertainment",
        "💄": "Beauty"
    };
    
    function getEmojiFromCategory(categoryName) {
        return Object.keys(categoryNames)
            .find(key => categoryNames[key] === categoryName) || '';
    }
    
    //Load budgets 
    async function loadBudgets() {
        const userId = parseInt(localStorage.getItem("userId"));
        const mainContent = document.getElementById("mainContent");
        if (!userId) return;
        
        const response = await fetch(`${API_URL}/budgets/${userId}`);
        const budgets = await response.json();

        const budgetList = document.getElementById('budgetList');

        if (budgets.length === 0) {
            return;
        }
        
        budgetList.innerHTML = '';

        let totalBudgetAmount = 0;
        let totalSpent = 0;
        let alerts = [];

        budgets.forEach(budget => {
            const spent = parseFloat(budget.spent);
            const limit = parseFloat(budget.monthly_limit);

            const percentage = (spent / limit) * 100;
            const remaining = (limit - spent).toFixed(2);

            totalBudgetAmount += limit;
            totalSpent += spent;

            if (percentage >= 85) {
                alerts.push(`${budget.category_name} budget at ${percentage.toFixed(0)}%`);
            }

            let progressClass = '';
            if (percentage >= 100) progressClass = 'danger';
            else if (percentage >= 75) progressClass = 'warning';

            const emoji = getEmojiFromCategory(budget.category_name);

            const budgetCard = `
                <div class="budget-card">
                    <div class="budget-header">
                        <span>${emoji} ${budget.category_name}</span>
                        <span>$${spent.toFixed(2)} / $${limit}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${progressClass}" style="width: ${Math.min(percentage, 100)}%;"></div>
                    </div>
                    <div class="budget-info">
                        <span>${percentage.toFixed(0)}% used</span>
                        <span>$${remaining} left</span>
                    </div>
                </div>
            `;

            budgetList.innerHTML += budgetCard;
        });

        const totalRemaining = totalBudgetAmount - totalSpent;

        document.getElementById('totalRemaining').textContent = `$${totalRemaining.toFixed(2)}`;
        document.getElementById('totalBudget').textContent = `$${totalBudgetAmount.toFixed(2)}`;
        mainContent.style.visibility = "visible";
    }
    
    //Load budgets on page load
    loadBudgets();
    </script>
</body>
</html>
