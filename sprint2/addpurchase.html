<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBud - Add Purchase</title>
    <link rel="stylesheet" href="appstyles.css">
</head>
<body>
<div class="container">
<div class="phone-frame">
<div class="screen">

<div class="status-bar">
    <span id="currentTime"></span>
    <div class="menu-wrapper">
        <span class="menu-dots" onclick="toggleMenu()">●●●</span>
        <div class="menu-dropdown" id="menuDropdown">
            <div onclick="logout()">Logout</div>
        </div>
    </div>
</div>

<div class="header">Add Purchase</div>

<div class="content">
<form id="purchaseForm">

<div class="form-group">
    <label class="form-label">Category</label>
    <select class="form-select" id="categorySelect" required>
        <option value="">Select category</option>
    </select>
</div>

<div class="form-group">
    <label class="form-label">Item Name</label>
    <input type="text" class="form-input" id="itemName" placeholder="e.g., Groceries, Gas, Shirt" required>
</div>

<div class="form-group">
    <label class="form-label">Store / Retailer</label>
    <input type="text" class="form-input" id="store" placeholder="e.g., Walmart, Target, Amazon">
</div>

<div class="form-group">
    <label class="form-label">Price</label>
    <input type="number" class="form-input" id="price" step="0.01" min="0" placeholder="0.00" required>
</div>

<div class="form-group">
    <label class="form-label">Quantity</label>
    <input type="number" class="form-input" id="quantity" value="1" min="1" required>
</div>

<div class="form-group">
    <label class="form-label">Tax Rate (%)</label>
    <input type="number" class="form-input" id="taxRate" value="8" step="0.01" min="0">
</div>

<div class="calculated-box">
    <div class="calc-row">
        <span>Subtotal:</span>
        <span id="subtotal">$0.00</span>
    </div>
    <div class="calc-row">
        <span>Tax (<span id="taxPercent">8</span>%):</span>
        <span id="tax">$0.00</span>
    </div>
    <div class="calc-row total">
        <span>Total:</span>
        <span id="total">$0.00</span>
    </div>
</div>

<button type="submit" class="btn-primary">Save Purchase</button>
<button type="button" class="btn-secondary" onclick="document.getElementById('purchaseForm').reset();calculateTotal();loadCategories();">
    Clear Form
</button>

</form>
</div>

<div class="nav-bar">
    <div class="nav-item"><a href="home.html" class="nav-icon">Home</a></div>
    <div class="nav-item active"><a href="addpurchase.html" class="nav-icon">Add</a></div>
    <div class="nav-item"><a href="budget.html" class="nav-icon">Budgets</a></div>
    <div class="nav-item"><a href="pricetracker.html" class="nav-icon">Prices</a></div>
</div>

</div>
</div>
</div>

<script>
/* ---------- TIME ---------- */
function updateTime() {
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes().toString().padStart(2, '0');
    document.getElementById('currentTime').textContent = `${hours}:${minutes}`;
}
updateTime();
setInterval(updateTime, 60000);

/* ---------- MENU ---------- */
function toggleMenu() {
    const menu = document.getElementById('menuDropdown');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
}

document.addEventListener('click', e => {
    const menu = document.getElementById('menuDropdown');
    if (!e.target.closest('.menu-wrapper') && menu) {
        menu.style.display = 'none';
    }
});

/* ---------- LOGIN CHECK ---------- */
if (!localStorage.getItem('isLoggedIn')) {
    window.location.href = 'index.html';
}

/* ---------- CALCULATIONS ---------- */
const priceEl = document.getElementById('price');
const quantityEl = document.getElementById('quantity');
const taxRateEl = document.getElementById('taxRate');
const subtotalEl = document.getElementById('subtotal');
const taxEl = document.getElementById('tax');
const totalEl = document.getElementById('total');
const taxPercent = document.getElementById('taxPercent');

function calculateTotal() {
    const price = parseFloat(priceEl.value) || 0;
    const qty = parseInt(quantityEl.value) || 1;
    const taxRate = parseFloat(taxRateEl.value) || 0;

    const subtotal = price * qty;
    const tax = subtotal * (taxRate / 100);
    const total = subtotal + tax;

    subtotalEl.textContent = `$${subtotal.toFixed(2)}`;
    taxEl.textContent = `$${tax.toFixed(2)}`;
    taxPercent.textContent = taxRate.toFixed(1);
    totalEl.textContent = `$${total.toFixed(2)}`;
}

priceEl.addEventListener('input', calculateTotal);
quantityEl.addEventListener('input', calculateTotal);
taxRateEl.addEventListener('input', calculateTotal);

/* ---------- LOAD CATEGORIES FROM DATABASE ---------- */
async function loadCategories() {
    try {
        const categorySelect = document.getElementById('categorySelect');
        categorySelect.innerHTML = '<option value="">Select category</option>';
        
        // Categories matching SpendCategory table
        const categories = [
            { id: 1, name: 'Food', emoji: '🍕' },
            { id: 2, name: 'Clothing', emoji: '👕' },
            { id: 3, name: 'Entertainment', emoji: '🎬' },
            { id: 4, name: 'Electronics', emoji: '📱' }
        ];
        
        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat.id;
            option.textContent = `${cat.emoji} ${cat.name}`;
            categorySelect.appendChild(option);
        });
    } catch (error) {
        console.error('Error loading categories:', error);
    }
}

/* ---------- SAVE PURCHASE TO DATABASE ---------- */
document.getElementById('purchaseForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const userId = localStorage.getItem('userId');
    const categoryId = document.getElementById('categorySelect').value;
    const expenseAmount = parseFloat(totalEl.textContent.replace('$', ''));
    const itemName = document.getElementById('itemName').value;

    console.log('=== SAVE PURCHASE DEBUG ===');
    console.log('User ID:', userId);
    console.log('Category ID:', categoryId);
    console.log('Expense Amount:', expenseAmount);
    console.log('Item Name:', itemName);

    if (!userId) {
        alert('❌ Not logged in! User ID is missing.');
        console.error('No userId in localStorage');
        return;
    }

    if (!categoryId) {
        alert('❌ Please select a category');
        return;
    }

    const requestData = {
        user_id: parseInt(userId),
        category_id: parseInt(categoryId),
        transaction_amount: expenseAmount,
        description: itemName
    };

    console.log('Sending to server:', requestData);

    try {
        const response = await fetch('http://localhost:3000/addPurchase', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestData)
        });

        console.log('Response status:', response.status);

        const data = await response.json();
        console.log('Response data:', data);

        if (response.ok) {
            alert('✅ Purchase saved successfully!');
            document.getElementById('purchaseForm').reset();
            calculateTotal();
            loadCategories();
        } else {
            console.error('Server error:', data);
            alert('❌ ' + (data.error || 'Failed to save purchase'));
        }
    } catch (error) {
        console.error('Full error:', error);
        alert('❌ Could not save purchase: ' + error.message);
    }
});

/* ---------- LOAD CATEGORIES ON PAGE LOAD ---------- */
loadCategories();
</script>
</body>
</html>
