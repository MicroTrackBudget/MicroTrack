<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBud - Create Account</title>
    <link rel="stylesheet" href="appstyles.css">
    
</head>
<body>
    <div class="confetti" id="confetti"></div>
    
    <div class="login-container">
        <div class="phone-frame">
            <div class="screen">
                <span id="currentTime"></span>
                <div class="status-bar">
                </div>
                
                <div class="content" style="padding-top: 30px;">
                    <div class="logo-container">
                        <div class="logo">💰</div>
                        <div class="app-name">BudgetBud</div>
                        <div class="tagline">by MicroTrack</div>
                    </div>
                    
                    <div class="welcome-text">
                        <h2>Create Your Account</h2>
                        <p>Start tracking your spending today! 🎯</p>
                    </div>
                    
                    <form id="signupForm">
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-input" id="fullName" placeholder="John Doe" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-input" id="email" placeholder="your.email@example.com" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-input" id="password" placeholder="••••••••" required minlength="6">
                            <div class="password-strength">
                                <div class="password-strength-bar" id="strengthBar"></div>
                            </div>
                            <div class="password-hint" id="strengthText">Password must be at least 6 characters</div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" required>
                            <div class="password-hint" id="matchText"></div>
                        </div>
                        
                        <button type="submit" class="btn-primary" style="margin-top: 20px;">
                            Create Account 🚀
                        </button>
                        
                        <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">
                            Already Have an Account? Log In
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        //Update time
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = `${hours}:${minutes}`;
        }
        updateTime();
        setInterval(updateTime, 60000);
        
        //Confetti animation
        function createConfetti() {
            const confetti = document.getElementById('confetti');
            const symbols = ['$', '💰', '💵', '💸', '💲', '💴', '💶', '💷'];
            const colors = ['#4CAF50', '#81C784', '#66BB6A', '#FFD700', '#FFC107'];
            
            setInterval(() => {
                const dollar = document.createElement('div');
                dollar.className = 'dollar';
                const symbol = symbols[Math.floor(Math.random() * symbols.length)];
                dollar.textContent = symbol;
                dollar.style.left = Math.random() * 100 + '%';
                dollar.style.animationDuration = (Math.random() * 3 + 3) + 's';
                dollar.style.fontSize = (Math.random() * 20 + 20) + 'px';
                
                if (symbol === '$') {
                    dollar.style.color = colors[Math.floor(Math.random() * colors.length)];
                }
                
                confetti.appendChild(dollar);
                
                setTimeout(() => {
                    dollar.remove();
                }, 6000);
            }, 400);
        }
        
        createConfetti();
        
        //Burst of confetti
        function confettiBurst() {
            const confetti = document.getElementById('confetti');
            const symbols = ['💰', '💵', '💸', '💲'];
            
            for(let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const dollar = document.createElement('div');
                    dollar.className = 'dollar';
                    dollar.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    dollar.style.left = (Math.random() * 100) + '%';
                    dollar.style.animationDuration = '2s';
                    dollar.style.fontSize = (Math.random() * 16 + 24) + 'px';
                    confetti.appendChild(dollar);
                    
                    setTimeout(() => dollar.remove(), 2000);
                }, i * 40);
            }
        }
        
        //Password strength checker
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z\d]/.test(password)) strength++;
            
            strengthBar.className = 'password-strength-bar';
            
            if (strength < 2) {
                strengthBar.classList.add('strength-weak');
                strengthText.textContent = 'Weak password';
                strengthText.style.color = '#F44336';
            } else if (strength < 4) {
                strengthBar.classList.add('strength-medium');
                strengthText.textContent = 'Medium strength';
                strengthText.style.color = '#FF9800';
            } else {
                strengthBar.classList.add('strength-strong');
                strengthText.textContent = 'Strong password!';
                strengthText.style.color = '#4CAF50';
            }
        });
        
        //Password match checker
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;
            const matchText = document.getElementById('matchText');
            
            if (confirmPassword.length > 0) {
                if (password === confirmPassword) {
                    matchText.textContent = '✓ Passwords match';
                    matchText.style.color = '#4CAF50';
                } else {
                    matchText.textContent = '✗ Passwords do not match';
                    matchText.style.color = '#F44336';
                }
            } else {
                matchText.textContent = '';
            }
        });
        
        //Handle signup form submission
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('email').value.toLowerCase().trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (password !== confirmPassword) {
        alert('❌ Passwords do not match!');
        return;
    }

    if (password.length < 6) {
        alert('❌ Password must be at least 6 characters long!');
        return;
    }

    try {
        const response = await fetch('/api/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fullName, email, password })
        });
        const data = await response.json();

        if (response.ok) {
            confettiBurst();
            alert('✅ Account created successfully!');
            window.location.href = 'index.html';
        } else {
            alert(`❌ ${data.error}`);
        }
    } catch (err) {
        alert('❌ Server error: ' + err.message);
    }
});
    </script>
</body>
</html>
