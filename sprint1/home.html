<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBud - Home</title>
    <link rel="stylesheet" href="appstyles.css">
</head>
<body>
    <div class="container">
        <div class="phone-frame">
            <div class="screen">
                <div class="status-bar">
                    <span id="currentTime"></span>
                <div class="menu-wrapper">
        <span class="menu-dots" onclick="toggleMenu()">●●●</span>
        <div class="menu-dropdown" id="menuDropdown">
            <div onclick="logout()">Logout</div>
        </div>
    </div>  
                </div>
                
                <div class="header">
                    BudgetBud
                </div>
              
                <div class="content">
                    <div class="summary-box">
                        <div class="summary-label">Monthly Budget Remaining</div>
                        <div class="summary-value" id="totalRemaining">$0.00</div>
                        <div class="summary-label" style="margin-top: 5px;">of <span id="totalBudget">$0.00</span></div>
                    </div>
                    
                    <div class="alert-box" id="alertBox" style="display: none;">
                        ⚠️ <span id="alertMessage"></span>
                    </div>
                    
                    <div class="section-title">Active Budgets</div>
                    
                    <div id="budgetList">
                        <div style="text-align: center; padding: 40px 20px; color: #999;">
                            <p style="font-size: 48px; margin-bottom: 10px;">📊</p>
                            <p>No budgets yet!</p>
                            <p style="font-size: 13px; margin-top: 10px;">Click on "Budgets" below to create your first budget</p>
                        </div>
                    </div>
                </div>
                
                <div class="nav-bar">
                    <div class="nav-item active">
                        <a href="home.html" class="nav-icon">Home</a>
                    </div>
                    <div class="nav-item">
                        <a href="addpurchase.html" class="nav-icon">Add</a>
                    </div>
                    <div class="nav-item">
                        <a href="budget.html" class="nav-icon">Budgets</a>
                    </div>
                    <div class="nav-item">
                        <a href="pricetracker.html" class="nav-icon">Prices</a>
                    </div>
                    <div class="nav-item">
                        <a href="calculator.html" class="nav-icon">Calc</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>

    //Update time
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = `${hours}:${minutes}`;
        }
        updateTime();
        setInterval(updateTime, 60000);

    function toggleMenu() {
    const menu = document.getElementById('menuDropdown');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

function logout() {
    localStorage.removeItem('isLoggedIn');
    window.location.href = 'index.html';
}

//Close when clicking outside
document.addEventListener('click', function(e) {
    const menu = document.getElementById('menuDropdown');
    if (!e.target.closest('.menu-wrapper') && menu) {
        menu.style.display = 'none';
    }
});
    
//Check if user is logged in
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'index.html';
        }
        
//Load budgets from localStorage
        function loadBudgets() {
            const budgets = JSON.parse(localStorage.getItem('budgets') || '[]');
            const purchases = JSON.parse(localStorage.getItem('purchases') || '[]');
            
            if (budgets.length === 0) {
                return;
            }
            
            const budgetList = document.getElementById('budgetList');
            budgetList.innerHTML = '';
            
            let totalBudgetAmount = 0;
            let totalSpent = 0;
            let alerts = [];
            
            budgets.forEach(budget => {

        //Calculate spent amount for this budget
                const budgetPurchases = purchases.filter(p => p.category === budget.name);
                const spent = budgetPurchases.reduce((sum, p) => sum + parseFloat(p.total), 0);
                const percentage = (spent / budget.limit * 100);
                const remaining = (budget.limit - spent).toFixed(2);
                
                totalBudgetAmount += parseFloat(budget.limit);
                totalSpent += spent;
                
        //Check for alerts
                if (percentage >= 85) {
                    alerts.push(`${budget.name} budget at ${percentage}% - $${remaining} remaining`);
                }
                
        //Determine progress bar color
                let progressClass = '';
                if (percentage >= 100) progressClass = 'danger';
                else if (percentage >= 75) progressClass = 'warning';
                
                const budgetCard = `
                    <div class="budget-card">
                        <div class="budget-header">
                            <span>${budget.emoji} ${budget.name}</span>
                            <span>$${spent.toFixed(2)} / $${budget.limit}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${progressClass}" style="width: ${Math.min(percentage, 100)}%;"></div>
                        </div>
                        <div class="budget-info">
                            <span>${percentage}% used</span>
                            <span>$${remaining} left</span>
                        </div>
                    </div>
                `;
                budgetList.innerHTML += budgetCard;
            });
            
        //Update totals
            const totalRemaining = totalBudgetAmount - totalSpent;
            document.getElementById('totalRemaining').textContent = `$${totalRemaining.toFixed(2)}`;
            document.getElementById('totalBudget').textContent = `$${totalBudgetAmount.toFixed(2)}`;
            
        //Show alerts
            if (alerts.length > 0) {
                document.getElementById('alertBox').style.display = 'block';
                document.getElementById('alertMessage').textContent = alerts[0];
            }
        }
        
        //Load budgets on page load
        loadBudgets();
    </script>
</body>
</html>
