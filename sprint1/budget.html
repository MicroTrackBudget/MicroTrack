<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBud - Manage Budgets</title>
    <link rel="stylesheet" href="appstyles.css">
        
</head>
<body>
    <div class="container">
        <div class="phone-frame">
            <div class="screen">
                <div class="status-bar">
                    <span id="currentTime"></span>
                    <div class="menu-wrapper">
    <span class="menu-dots" onclick="toggleMenu()">●●●</span>
    <div class="menu-dropdown" id="menuDropdown">
        <div onclick="logout()">Logout</div>
    </div>
</div>
                </div>
                
                <div class="header">Manage Budgets</div>
                
                <div class="content" style="padding-bottom: 80px;">
                    <div class="summary-box" style="background: #E3F2FD; border: 2px solid #2196F3;">
                        <div class="summary-label">Total Monthly Budget</div>
                        <div class="summary-value" style="color: #2196F3;" id="totalBudget">$0</div>
                    </div>
                    
                    <div class="section-title">Your Budgets</div>
                    
                    <div id="budgetsList">
                        <div style="text-align: center; padding: 40px 20px; color: #999;">
                            <p style="font-size: 48px; margin-bottom: 10px;">💸</p>
                            <p>No budgets yet!</p>
                            <p style="font-size: 13px; margin-top: 10px;">Click the + button below to create your first budget</p>
                        </div>
                    </div>
                    
                    <div class="section-title" style="margin-top: 30px;">Actions</div>
                    
                    <button class="btn-primary" style="margin-bottom: 10px;" onclick="openModal()">Create New Budget</button>
                    <button class="btn-secondary" onclick="viewReport()">View Spending Report</button>
                </div>
                
                <div class="add-button" onclick="openModal()">+</div>
                
                <div class="nav-bar">
                    <div class="nav-item">
                        <a href="home.html" class="nav-icon">Home</a>
                    </div>
                    <div class="nav-item">
                        <a href="addpurchase.html" class="nav-icon">Add</a>
                    </div>
                    <div class="nav-item active">
                        <a href="budget.html" class="nav-icon">Budgets</a>
                    </div>
                    <div class="nav-item">
                        <a href="pricetracker.html" class="nav-icon">Prices</a>
                    </div>
                    <div class="nav-item">
                        <a href="calculator.html" class="nav-icon">Calc</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!--Budget Modal-->
    <div id="budgetModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                Create New Budget
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            
            <form id="budgetForm">
                <div class="form-group">
                    <label class="form-label">Choose an Emoji</label>
                    <div class="emoji-picker" id="emojiPicker">
                        <div class="emoji-option" onclick="selectEmoji('🛒')">🛒</div>
                        <div class="emoji-option" onclick="selectEmoji('👕')">👕</div>
                        <div class="emoji-option" onclick="selectEmoji('📱')">📱</div>
                        <div class="emoji-option" onclick="selectEmoji('🎮')">🎮</div>
                        <div class="emoji-option" onclick="selectEmoji('🍕')">🍕</div>
                        <div class="emoji-option" onclick="selectEmoji('⛽')">⛽</div>
                        <div class="emoji-option" onclick="selectEmoji('🏠')">🏠</div>
                        <div class="emoji-option" onclick="selectEmoji('✈️')">✈️</div>
                        <div class="emoji-option" onclick="selectEmoji('🏥')">🏥</div>
                        <div class="emoji-option" onclick="selectEmoji('📚')">📚</div>
                        <div class="emoji-option" onclick="selectEmoji('🎬')">🎬</div>
                        <div class="emoji-option" onclick="selectEmoji('💄')">💄</div>
                    </div>
                    <input type="hidden" id="selectedEmoji" value="🛒">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Budget Name</label>
                    <input type="text" class="form-input" id="budgetName" placeholder="e.g., Groceries, Clothing" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Monthly Limit ($)</label>
                    <input type="number" class="form-input" id="budgetLimit" placeholder="0.00" step="0.01" min="0" required>
                </div>
                
                <button type="submit" class="btn-primary">Create Budget</button>
                <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
            </form>
        </div>
        </div>
    
        <script>
    //Update time
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = `${hours}:${minutes}`;
        }
        updateTime();
        setInterval(updateTime, 60000);

    function toggleMenu() {
    const menu = document.getElementById('menuDropdown');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

        function logout() {
    localStorage.removeItem('isLoggedIn');
    window.location.href = 'index.html';
}

//Close when clicking outside
document.addEventListener('click', function(e) {
    const menu = document.getElementById('menuDropdown');
    if (!e.target.closest('.menu-wrapper') && menu) {
        menu.style.display = 'none';
         }
        });
        
    //Check if user is logged in
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'index.html';
        }
        
        let selectedEmojiValue = '🛒';
        
        function selectEmoji(emoji) {
            selectedEmojiValue = emoji;
            document.getElementById('selectedEmoji').value = emoji;
            
    //Update UI
            document.querySelectorAll('.emoji-option').forEach(el => {
                el.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }
        
        function openModal() {
            document.getElementById('budgetModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('budgetModal').classList.remove('active');
            document.getElementById('budgetForm').reset();
        }
        
        function viewReport() {
            const purchases = JSON.parse(localStorage.getItem('purchases') || '[]');
            if (purchases.length === 0) {
                alert('No purchases recorded yet!');
                return;
            }
            
            let report = 'Spending Report:\n\n';
            const total = purchases.reduce((sum, p) => sum + p.total, 0);
            report += `Total Spent: $${total.toFixed(2)}\n`;
            report += `Total Purchases: ${purchases.length}\n\n`;
            
    //Group by category
            const byCategory = {};
            purchases.forEach(p => {
                if (!byCategory[p.category]) {
                    byCategory[p.category] = 0;
                }
                byCategory[p.category] += p.total;
            });
            
            report += 'By Category:\n';
            Object.entries(byCategory).forEach(([cat, amount]) => {
                report += `${cat}: $${amount.toFixed(2)}\n`;
            });
            
            alert(report);
        }
        
        function deleteBudget(budgetName) {
            if (confirm(`Are you sure you want to delete the ${budgetName} budget?`)) {
                let budgets = JSON.parse(localStorage.getItem('budgets') || '[]');
                budgets = budgets.filter(b => b.name !== budgetName);
                localStorage.setItem('budgets', JSON.stringify(budgets));
                loadBudgets();
            }
        }
        
        function loadBudgets() {
            const budgets = JSON.parse(localStorage.getItem('budgets') || '[]');
            const purchases = JSON.parse(localStorage.getItem('purchases') || '[]');
            const budgetsList = document.getElementById('budgetsList');
            
            if (budgets.length === 0) {
                budgetsList.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px; color: #999;">
                        <p style="font-size: 48px; margin-bottom: 10px;">💸</p>
                        <p>No budgets yet!</p>
                        <p style="font-size: 13px; margin-top: 10px;">Click the + button below to create your first budget</p>
                    </div>
                `;
                document.getElementById('totalBudget').textContent = '$0';
                return;
            }
            
            let totalBudgetAmount = 0;
            budgetsList.innerHTML = '';
            
            budgets.forEach(budget => {
                const budgetPurchases = purchases.filter(p => p.category === budget.name);
                const spent = budgetPurchases.reduce((sum, p) => sum + parseFloat(p.total), 0);
                const percentage = (spent / budget.limit * 100)
                
                totalBudgetAmount += parseFloat(budget.limit);
                
                let statusColor = '#4CAF50';
                if (percentage >= 100) statusColor = '#F44336';
                else if (percentage >= 75) statusColor = '#FF9800';
                
                const budgetItem = `
                    <div class="budget-list-item">
                        <div class="budget-list-info">
                            <h3>${budget.emoji} ${budget.name}</h3>
                            <div class="budget-list-details">
                                <div class="mini-icon" style="background: ${statusColor};"></div>
                                ${percentage}% used • ${budgetPurchases.length} purchases
                            </div>
                        </div>
                        <div class="budget-list-amount">
                            <div class="amount-spent">$${spent.toFixed(2)}</div>
                            <div class="amount-limit">of $${budget.limit}</div>
                            <button onclick="deleteBudget('${budget.name}')" style="margin-top: 8px; padding: 4px 12px; background: #F44336; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 11px;">Delete</button>
                        </div>
                    </div>
                `;
                budgetsList.innerHTML += budgetItem;
            });
            
            document.getElementById('totalBudget').textContent = `$${totalBudgetAmount.toFixed(2)}`;
        }
        
    //Handle form submission
        document.getElementById('budgetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const budget = {
                name: document.getElementById('budgetName').value,
                emoji: selectedEmojiValue,
                limit: parseFloat(document.getElementById('budgetLimit').value),
                created: new Date().toISOString()
            };
            
        //Save to localStorage
            const budgets = JSON.parse(localStorage.getItem('budgets') || '[]');
            budgets.push(budget);
            localStorage.setItem('budgets', JSON.stringify(budgets));
            
            closeModal();
            loadBudgets();
            
            alert('✅ Budget created successfully!');
        });
        
        //Load budgets on page load
        loadBudgets();
        
        //Select first emoji by default
        document.querySelector('.emoji-option').classList.add('selected');
    </script>
</body>
</html>
